apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: secrets-store-token-creator
  namespace: chat-app
rules:
  - apiGroups: [""]
    resources: ["serviceaccounts/token"]
    verbs: ["create"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: secrets-store-token-creator-binding
  namespace: chat-app
subjects:
  - kind: ServiceAccount
    name: csi-secrets-store-provider-aws
    namespace: kube-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: secrets-store-token-creator